      <p>🌕2022年中秋晚宴🥮</p>
      <p>花好月圆日，中秋喜相逢。</p>
      <p>为了欢庆中秋佳节，南华宿舍自治委员会将于02.09.2022（星期五）下午六点于本校A Court 篮球场举办“2022年中秋晚宴”。</p>
      <p>丹桂飘香又中秋，花好月圆人长久。</p>
      <p>南华独中在此预祝各界中秋节快乐。</p>
      <p>#中秋晚宴 #中秋节</p>
