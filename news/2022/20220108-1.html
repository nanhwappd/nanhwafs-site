    <h1>南华孩子走入社区</h1>
    <time datetime="2022-01-08">2022-01-08</time>
    <div class="body">
      <p>南华孩子走入社区</p>
      <p>育英华小将迎接 100年庆，董家教三机构开始为该校进行美化活动。</p>
      <p>今天早上7点，曼绒文友会理事及文友在吴明月老师的带领下，联合育英华小教职员、育英华小三大机构及南华独中师生，在福清洋育英华小协助吴老师画好的壁画进行填色。</p>
