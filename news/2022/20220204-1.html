    <time datetime="2022-02-04">2022-02-04</time>
    <div class="body">
      <p>🌿立春🌿</p>
      <p>是干支历二十四节气中的第一个节气，又名岁首、立春节、正月节。干支纪年法，以立春为岁首，交节日为月首。</p>
      <p>相传有一民俗游戏，是人们将鸡蛋手扶在平面久立后，尝试松手后让蛋不倒，有俗谚为：“春分到，蛋儿俏。”</p>
      <p>今日，你立春了吗？</p>
      <p>#南华独中 #立春 #廿四节气 #实兆远曼绒</p>
