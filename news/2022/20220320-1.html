      <p>春分之日，</p>
      <p>太阳光不偏不倚地直射在赤道上。节气至春分，昼夜平均的背后是阴阳调和，万物仿佛呼应着中正平和的人间秩序。春分如音律之和谐，一切都是刚刚好。</p>
      <p>南华独中顺祝大家，</p>
      <p>如春分般恰到好处的平安。</p>
