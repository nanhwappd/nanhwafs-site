    <h1>“中华剪纸”是流传至今的著名民间艺术之一，更是营造春节气氛的不二功臣。上至炎黄帝</h1>
    <time datetime="2022-01-21">2022-01-21</time>
    <div class="body">
      <p>“中华剪纸”是流传至今的著名民间艺术之一，更是营造春节气氛的不二功臣。上至炎黄帝君，下至寻常百姓家，无不喜爱剪纸艺术。</p>
      <p>为了让师生提前欢庆新春佳节，感受新春喜庆，曼绒南华独中联课处特此筹办“2022年新春剪纸比赛”诚邀全校师生共襄盛举，一同传承春节习俗文化。</p>
