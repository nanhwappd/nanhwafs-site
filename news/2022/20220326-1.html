    <div class="body">
      <p>🔥专题联课@崭新模式🔥</p>
      <p>重现 130 年前动画技术</p>
      <p>本校总结检讨近两年来的线上联课活动后，推出崭新的“专题联课”单元，一改过往以学会团体为个别单位的线上网课，换成全校师生齐看美术老师的现场直播，手把手教会重现130年前的“费纳奇镜动画制作”技术。</p>
      <p>#专题 #联课 #费纳奇镜 #动画制作 #美术  #南华独中 #曼绒 #实兆远</p>
