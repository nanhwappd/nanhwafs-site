    <h1>醒狮团</h1>
    <time datetime="2022-01-31">2022-01-31</time>
    <div class="body">
      <p>醒狮团</p>
      <p>于最后一天的上课日（28.01.2022）出动四头狮舞动全校。</p>
      <p>敲锣打鼓声响彻校园各个角落，</p>
      <p>四狮舞遍了各个办公室及班级，</p>
      <p>采下悬挂高处的“青”，</p>
      <p>象征着新的一年大吉大利，顺顺心心。</p>
      <p>即使董事、教职员和学生戴着口罩，</p>
      <p>仍难掩脸上浮现的笑意。</p>
      <p>#南华独中 #醒狮团 #班级采青 #虎年 #新春 #实兆远曼绒</p>
