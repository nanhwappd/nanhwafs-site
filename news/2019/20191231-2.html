      <p>31/12/2019</p>
      <p>特别通告：</p>
      <p>1. 2/1/2020 为新学年的第一个上课天，请各位学生收拾心情再度步上学习知识的旅程。</p>
      <p>2. 2/1/2020 的放学时间为 1445，当天将没有联课活动。</p>
      <p>敬请全体师生和家长垂注，并恭祝各位新年新年代快乐。</p>
