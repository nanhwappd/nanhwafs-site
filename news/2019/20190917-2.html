    <h1>17/9/2019</h1>
    <time datetime="2019-09-17">2019-09-17</time>
    <div class="body">
      <p>17/9/2019</p>
      <p>基于曼绒县的空气污染指数已经冲破200，而且还有持续上升的趋势。本校决定明天9月18日停课一天，请同学们在家安养身体。</p>
      <p>考生们的模拟考将会展延至9月25日，时间表和地点照旧，也请考生们注意。</p>
      <p>请看到的家长们互相告知，转发，学校也会发讯息给家长的电话。</p>
