    <h1>今天南华天使们与五杰学校的学生一起上课并体验不同的教学方式。分别是语文课《京剧趣</h1>
    <time datetime="2019-12-12">2019-12-12</time>
    <div class="body">
      <p>今天南华天使们与五杰学校的学生一起上课并体验不同的教学方式。分别是语文课《京剧趣谈》，数学课《数与形》及英语课《How do you feel》。南华天使黄乙航同学在数学课时也上前去示范教学。过后也将纪念品送给老师及学生们，让他们做个留念。</p>
