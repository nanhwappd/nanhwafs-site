      <p>本校队伍在香港岭南大学举办STEAM 国际创客挑战赛中成功挺进决赛并斩获三等奖！为校争光，为国争光！</p>
      <p>恭喜汪朝文老师，林修弘同学，余延峰同学和黄宇炫同学凭着作品“智能街灯”成功在国际赛场上证明了自己。</p>
