    <div class="body">
      <p>18/8/2019</p>
      <p>为期三天的 Arduino 集中课程结束，谢谢颜豋翰先生与他的团队仔细地教导，并随着学生的要求更改课程难度。</p>
      <p>我们看着学生对C语言一知半解到独立设计自己的回路，通过组装触控幕和音响制造出简易的钢琴，改变编码配合无线网络做出来天气监测站，今天的基础是他们未来的基石。</p>
