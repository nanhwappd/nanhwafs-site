    <h1>来临的星期五1月26日，将举办本年度马来西亚语校内作文比赛，时间是早上7时半至8</h1>
    <time datetime="2018-01-22">2018-01-22</time>
    <div class="body">
      <p>来临的星期五1月26日，将举办本年度马来西亚语校内作文比赛，时间是早上7时半至8时50分，比赛结束后照常上课，地点于各班级课室。</p>
      <p>考生将分为三组：</p>
      <p>A组：初一及初二学生</p>
      <p>B组：初三及高一学生</p>
      <p>C组：高一及高二学生</p>
      <p>在此预祝各为学生笔上生花。</p>
