    <div class="body">
      <p>10/5/2018</p>
      <p>为了配合第14届大选，政府首席秘书阿里韩沙宣布星期四（10号）以及星期五（11号）为公假。</p>
      <p>因此5月10日，5月11日皆没有上课，此外5月12日的补课也被取消。希望各位同学们在家中好好休息，并为6月1日的期中考作准备。</p>
