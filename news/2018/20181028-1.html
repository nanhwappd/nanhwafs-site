    <h1>致全体家长及学生</h1>
    <time datetime="2018-10-28">2018-10-28</time>
    <div class="body">
      <p>致全体家长及学生</p>
      <p>由于霹雳州野牛队在本届大马足球赛中荣获冠军，霹雳州政府已将2018年10月29日(星期一)列为公共假期。</p>
      <p>为了配合州政府的决定，本校将于2018年10月29日(星期一)休假一天，全体师生于2018年10月30日(星期二)照常上课。</p>
      <p>敬请垂注。</p>
      <p>校长室 启</p>
