    <div class="body">
      <p>21/5/2018</p>
      <p>2017年下霹雳散文创作比赛的成绩终于公布，虽然只是第一次参赛却也能夺下三个奖项，恭喜同学们</p>
      <p>高中组 优秀奖 李宽柔 高二爱</p>
      <p>初中组 优秀奖 黄琳陵 初二爱</p>
      <p>初中组 鼓励奖 董慧宜 初三爱</p>
      <p>希望有了这次参赛经验，同学们可以在2018年的比赛中夺下更高的荣耀。</p>
