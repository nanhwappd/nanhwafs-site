      <p>25/5/2018</p>
      <p>下周二（29/5）为卫塞节，法定公共假日休假一天，30/5周三照常上课。</p>
      <p>此外，（2/6）为可兰经降世日，法定公共假日休假一天，（4/6）周一照常考试。</p>
      <p>最后，（1/6）至（8/6）为考试周，请同学们记得复习功课，为一学期的努力画下一个完美的句点。</p>
