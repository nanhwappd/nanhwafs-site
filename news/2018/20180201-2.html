    <time datetime="2018-02-01">2018-02-01</time>
    <div class="body">
      <p>高三筹委会招广告通知</p>
      <p>本校应届高三毕业生（第44届）代表将于 12/2/2018 至 18/5/2018 分组外出向商家和社会人士征求刊登广告或乐捐以资助出版毕业刊的经费。</p>
      <p>谢符财校长感谢商家及各界热心人士多年来的赞助，更冀望各方继续给予支持，使此特刊能顺利出版。</p>

    </div>
