    <h1>25/7/2018</h1>
    <time datetime="2018-07-25">2018-07-25</time>
    <div class="body">
      <p>25/7/2018</p>
      <p>恭喜本校华乐团代表在槟城的春蕾华乐比赛中，合奏和敲击队都夺下了金奖。</p>
      <p>看着他们每天自动留下练习从下午一直练习到夜晚。</p>
      <p>看着他们捉紧每一个机会彩排、演练、纠正最终获得了回报。</p>
      <p>相信那种兴奋之情是无法以言语来表达的。</p>
      <p>在此恭喜他们衣锦还乡，也祝福他们来年可以继续维持表现。</p>
