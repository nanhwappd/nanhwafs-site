    <h1>传统的教育方式让父母只懂得用责骂或妥协的方式与孩子们沟通。</h1>
    <time datetime="2018-08-13">2018-08-13</time>
    <div class="body">
      <p>传统的教育方式让父母只懂得用责骂或妥协的方式与孩子们沟通。</p>
      <p>这类型的沟通方式导致现代的父母与孩子们的关系产生代沟，家庭与社会问题也因彼此无法了解和尊重而相继产生。</p>
      <p>不要让您的孩子成为下一位受害者！</p>
      <p>学会如何做一个称职的父母亲子教练来帮助孩子们从而让他们能够在身心灵健全成长的环境下，找到他们自己的人生去向！</p>
