    <h1>💐南华独中送蛋糕予华小贺华小教师节💐</h1>
    <time datetime="2025-05-16">2025-05-16</time>
    <div class="body">
      <p>💐南华独中送蛋糕予华小贺华小教师节💐</p>
      <p>教诲如春风，师恩似海深，</p>
      <p>桃李满天下，春晖遍四方。</p>
      <p>华小教师在栽培教育华人子弟的路上不遗余力，南华独中“咖啡与甜点艺术”学生亲手制作蛋糕，并由各华小校友暨南华独中在籍学生送达母校，亲手送上祝福。</p>
      <p>感恩华小老师们，十年树木，百年树人。老师们，您们辛苦了！</p>

    </div>
