    <h1>惊悉本校前任董事长陈志成先生仙逝，全体董家教师生校友不胜悲恸。</h1>
    <time datetime="2025-03-27">2025-03-27</time>
    <div class="body">
      <p>惊悉本校前任董事长陈志成先生仙逝，全体董家教师生校友不胜悲恸。</p>
      <p>先生之风，山高水长！</p>
      <p>先生远去，万物同悲。</p>
      <p>在此，全体董家教师生校友对此表示深切哀悼，向先生亲朋表示由衷问候，务望节哀！</p>
      <p>愿先生之风骨永存，盛德不泯！</p>
