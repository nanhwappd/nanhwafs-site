    <h1>用快门说故事，</h1>
    <time datetime="2023-07-24">2023-07-24</time>
    <div class="body">
      <p>用快门说故事，</p>
      <p>用镜头定格曼绒人文。</p>
      <p>本校董事长颜登逸先生与刘文琸博士带领南华独中热爱摄影的孩子，于周末间走出校园，步入曼绒实兆远各个角落。董事长与刘博士传授孩子户外拍摄的技巧，传授孩子以瞬间定格永恒，透过镜头去寻访在地人文文化之美。</p>
      <p>#摄影艺术 #户外拍摄 #人文文化</p>
