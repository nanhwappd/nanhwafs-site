    <h1>资历/条件：</h1>
    <time datetime="2021-04-14">2021-04-14</time>
    <div class="body">
      <p>资历/条件：</p>
      <p>1）申请者必须具备相关领域的专科文凭或学士学位；</p>
      <p>2）掌握华文及英文应用（授课和教材内容媒介语均以华语为主英语为辅）；</p>
      <p>3）优先录取有教学经验者（应届毕业生也欢迎申请）</p>
      <p>有意应征者请将履历表、文凭及近照传至本校邮箱，有无工作经验者皆可应征，合则电约面谈。 *外坡者提供住宿，免水电。</p>
