    <h1>本校于今日（2021年3月9日）与中国天津大学签署合作协议，以推荐优秀的南华独中</h1>
    <time datetime="2021-03-09">2021-03-09</time>
    <div class="body">
      <p>本校于今日（2021年3月9日）与中国天津大学签署合作协议，以推荐优秀的南华独中孩子到天津大学升学。符合天津大学要求的孩子们将获得学费、住宿费、生活费等津贴。</p>
