    <h1>本校联课活动向来秉持着透过全方位学习的活动，促进学生全人发展，为学生提供应有的学</h1>
    <time datetime="2021-09-03">2021-09-03</time>
    <div class="body">
      <p>本校联课活动向来秉持着透过全方位学习的活动，促进学生全人发展，为学生提供应有的学习经历，培养学生各种共通能力及正确价值观和态度。新冠疫情肆虐期间，学生居家学习之余，本校不忘促进学生身心全面发展，特此将联课活动改以线上方式进行。</p>
