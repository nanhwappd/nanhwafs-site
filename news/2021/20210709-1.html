      <p>各位同学，下一次的环境教育课程的主题是杜绝水污。</p>
      <p>时间：7月31日 早上7.30</p>
      <p>同样以学校官方钉钉为网上课。</p>
      <p>期待 The Habitat Penang Hill 继续带我们认识课本以外的马来西亚。</p>
      <p>此外下一次的环境课程功课的主题是《杜绝塑料》，期待同学们的作品，若需要知道更多细节可以询问各班的班导师。</p>
