    <div class="body">
      <p>八月中秋月儿圆，合家团聚乐无边。距离中秋还有1个月，南华独中联课处主办了以“环保”为主题的中秋节环保灯笼制作比赛，宗旨是让师生们在这花好月圆的节日下一起动动手制作环保灯笼。期待此活动可以促进家庭关系，也提高大家的环保意识，可以一起来爱地球。</p>
