    <h1>食堂翻修己完成80%了,也局部的开始使用,但由于工作人员刚使用新系统,这两天虽然</h1>
    <time datetime="2020-01-03">2020-01-03</time>
    <div class="body">
      <p>食堂翻修己完成80%了,也局部的开始使用,但由于工作人员刚使用新系统,这两天虽然有点小混乱,也造成大家的不便,在此向老师,家长及同学们说声抱歉,校方与董事会及家联都一直努力改善有关问题,相信这两天就会有所改善,请大家多多包函。</p>
