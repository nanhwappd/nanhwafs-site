    <h1>马来西亚 Carlsberg集团为回馈社会，赞助主办的“安全校园” 计划，今天为</h1>
    <time datetime="2020-08-18">2020-08-18</time>
    <div class="body">
      <p>马来西亚 Carlsberg集团为回馈社会，赞助主办的“安全校园” 计划，今天为我校提供全校消毒服务。</p>
