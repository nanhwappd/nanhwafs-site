    <h1>学校目前并没有任何人有疫情的症状发生,停课是为了防范万一,并且考虑到我们的网上教</h1>
    <time datetime="2020-10-20">2020-10-20</time>
    <div class="body">
      <p>学校目前并没有任何人有疫情的症状发生,停课是为了防范万一,并且考虑到我们的网上教学系统相对比较完整,根据之前的经验,出席率几乎一百巴仙,对学习的进度影响不大,停课并不代表停学之下做出停课一周的决定。</p>
